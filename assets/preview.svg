      <text x="24" y="68" class="theme-sub" fill="#68707a">Warm daylight</text>
      <circle cx="38" cy="108" r="16" fill="#ffb84d"/><circle cx="82" cy="108" r="16" fill="#1d8fff"/><circle cx="126" cy="108" r="16" fill="#26a269"/>
