      <text x="24" y="68" class="theme-sub" fill="#d7d0c5">Wall control</text>
      <circle cx="38" cy="108" r="16" fill="#ffb84d"/><circle cx="82" cy="108" r="16" fill="#4da3ff"/><circle cx="126" cy="108" r="16" fill="#ff6b6b"/>
      <rect x="170" y="92" width="54" height="32" rx="16" fill="#2e2618"/><circle cx="205" cy="108" r="12" fill="#ffc56d"/>
    </g>
    <g transform="translate(0 178)">
      <rect width="252" height="146" rx="18" fill="#f6f8fb" stroke="#dbe5f2"/>
      <text x="24" y="42" class="theme-name" fill="#1f2937">Classic Light</text>
      <text x="24" y="68" class="theme-sub" fill="#64748b">Blue native HA</text>
      <circle cx="38" cy="108" r="16" fill="#2b8cff"/><circle cx="82" cy="108" r="16" fill="#ffb84d"/><circle cx="126" cy="108" r="16" fill="#22c55e"/>
      <rect x="170" y="92" width="54" height="32" rx="16" fill="#dbeafe"/><circle cx="205" cy="108" r="12" fill="#2b8cff"/>
