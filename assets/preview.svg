      <text x="24" y="42" class="theme-name" fill="#f7f2ea">Yeelight Dark</text>
      <text x="24" y="68" class="theme-sub" fill="#b7b0a6">Night dashboard</text>
      <circle cx="38" cy="108" r="16" fill="#ffc56d"/><circle cx="82" cy="108" r="16" fill="#4da3ff"/><circle cx="126" cy="108" r="16" fill="#3ddc97"/>
      <rect x="170" y="92" width="54" height="32" rx="16" fill="#513a1d"/><circle cx="205" cy="108" r="12" fill="#ffc56d"/>
