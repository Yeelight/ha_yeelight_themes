name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: "read"

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "theme"

  validate-theme-package:
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout repository
        uses: "actions/checkout@v4"

      - name: Setup Node.js
        uses: "actions/setup-node@v4"
        with:
          node-version: "22"

      - name: Validate Yeelight themes
        run: "node scripts/validate-themes.mjs"
