<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="840" viewBox="0 0 1440 840" role="img" aria-labelledby="title desc">
  <title id="title">Yeelight Themes preview for Home Assistant</title>
  <desc id="desc">Six Yeelight Home Assistant theme palettes shown with dashboard cards, controls, and entity state colors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ec"/>
      <stop offset="0.5" stop-color="#eef3f9"/>
      <stop offset="1" stop-color="#111318"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#12161f" flood-opacity="0.22"/>
    </filter>
    <style>
      .label{font:700 30px Inter,Arial,sans-serif;fill:#24272c}
      .sub{font:500 16px Inter,Arial,sans-serif;fill:#68707a}
      .theme-name{font:700 20px Inter,Arial,sans-serif}
      .theme-sub{font:500 12px Inter,Arial,sans-serif;opacity:.72}
      .metric{font:700 28px Inter,Arial,sans-serif}
      .small{font:600 12px Inter,Arial,sans-serif}
      .tiny{font:500 11px Inter,Arial,sans-serif}
    </style>
  </defs>

  <rect width="1440" height="840" fill="url(#bg)"/>
  <rect x="60" y="54" width="1320" height="732" rx="28" fill="#ffffff" opacity="0.78"/>
  <text x="104" y="118" class="label">Yeelight Themes</text>
  <text x="104" y="148" class="sub">A visual companion for Home Assistant dashboards, native controls, and Yeelight cards.</text>

  <g transform="translate(104 188)" filter="url(#shadow)">
    <rect width="376" height="500" rx="20" fill="#ffffff"/>
    <rect x="28" y="28" width="320" height="36" rx="10" fill="#fff0d6"/>
    <circle cx="48" cy="46" r="9" fill="#ffb84d"/>
    <rect x="68" y="38" width="142" height="16" rx="8" fill="#c76a00" opacity=".35"/>
    <rect x="28" y="92" width="150" height="158" rx="16" fill="#fff7ea" stroke="#e8ded1"/>
    <text x="48" y="128" class="small" fill="#68707a">Living room</text>
    <text x="48" y="164" class="metric" fill="#24272c">74%</text>
    <rect x="48" y="198" width="94" height="28" rx="14" fill="#ffb84d"/>
    <circle cx="127" cy="212" r="10" fill="#ffffff"/>
    <rect x="198" y="92" width="150" height="158" rx="16" fill="#f2f7ff" stroke="#d9e5f3"/>
    <text x="218" y="128" class="small" fill="#68707a">Media</text>
    <path d="M235 178l52-30v60z" fill="#1d8fff"/>
    <rect x="28" y="276" width="320" height="74" rx="16" fill="#ffffff" stroke="#e8ded1"/>
    <circle cx="66" cy="313" r="16" fill="#ffb84d"/>
    <rect x="96" y="299" width="150" height="12" rx="6" fill="#24272c" opacity=".22"/>
    <rect x="96" y="321" width="94" height="10" rx="5" fill="#68707a" opacity=".24"/>
    <rect x="278" y="296" width="44" height="34" rx="17" fill="#ffe2ae"/>
    <circle cx="305" cy="313" r="13" fill="#ffb84d"/>
    <rect x="28" y="374" width="320" height="72" rx="16" fill="#f7f3ec"/>
    <rect x="48" y="402" width="110" height="12" rx="6" fill="#ffb84d"/>
    <rect x="172" y="402" width="86" height="12" rx="6" fill="#1d8fff"/>
    <rect x="270" y="402" width="52" height="12" rx="6" fill="#26a269"/>
