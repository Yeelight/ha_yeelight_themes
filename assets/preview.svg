      <rect x="126" width="126" height="146" rx="18" fill="#202329"/>
      <text x="24" y="42" class="theme-name" fill="#24272c">Minimal</text>
      <text x="24" y="68" class="theme-sub" fill="#68707a">Light and dark mode</text>
      <circle cx="38" cy="108" r="16" fill="#ffb84d"/><circle cx="82" cy="108" r="16" fill="#6b7280"/><circle cx="126" cy="108" r="16" fill="#1d8fff"/>
      <rect x="170" y="92" width="54" height="32" rx="16" fill="#30343d"/><circle cx="205" cy="108" r="12" fill="#ffc56d"/>
    </g>
    <g transform="translate(0 380)">
      <rect width="812" height="120" rx="18" fill="#ffffff" opacity=".92"/>
      <text x="28" y="42" class="theme-name" fill="#24272c">Native Home Assistant coverage</text>
      <text x="28" y="70" class="sub">Cards, dialogs, buttons, selects, inputs, switches, sliders, sidebar, and state colors share the same Yeelight visual language.</text>
      <rect x="28" y="92" width="120" height="10" rx="5" fill="#ffb84d"/>
      <rect x="164" y="92" width="120" height="10" rx="5" fill="#1d8fff"/>
      <rect x="300" y="92" width="120" height="10" rx="5" fill="#26a269"/>
      <rect x="436" y="92" width="120" height="10" rx="5" fill="#d78100"/>
      <rect x="572" y="92" width="120" height="10" rx="5" fill="#d64545"/>
