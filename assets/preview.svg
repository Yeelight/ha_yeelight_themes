    <g transform="translate(280 178)">
      <rect width="252" height="146" rx="18" fill="#111827"/>
      <text x="24" y="42" class="theme-name" fill="#f8fafc">Classic Dark</text>
      <text x="24" y="68" class="theme-sub" fill="#b6c2d2">Blue dark HA</text>
      <circle cx="38" cy="108" r="16" fill="#60a5fa"/><circle cx="82" cy="108" r="16" fill="#ffc56d"/><circle cx="126" cy="108" r="16" fill="#34d399"/>
      <rect x="170" y="92" width="54" height="32" rx="16" fill="#1e3a5f"/><circle cx="205" cy="108" r="12" fill="#60a5fa"/>
